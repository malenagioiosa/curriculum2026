    <main id="main-contacto">
      <section class="contacto">
        <form
          method="post"
          action=""
          target="_blank"
          enctype="multipart/form-data"
        >
          <div class="datos">
            <div class="apellido">
              <label for="nombre">nombre y apellido*</label>
              <input
                type="text"
                name="nombre"
                id="nombre"
                maxlength="30"
                required
              />
            </div>
            <div class="email">
              <label for="email">mail*</label>
              <input type="mail" name="mail" id="email" required />
            </div>
          </div>

          <div class="idea">
            <label for="idea">Escribe cual es tu idea aqui...</label>
            <textarea name="idea" id="idea" maxlength="600" required></textarea>
          </div>

          <div class="gustaria">
            <p>¿Que proyecto te gustaría?</p>
            <div class="seleccionar">
              <label class="checkbox"
                ><input type="checkbox" /><span> Diseño</span></label
              >
              <label class="checkbox"
                ><input type="checkbox" /><span> Otra cosa</span></label
              >
            </div>
          </div>

          <input type="submit" class="boton-enviar" value="enviar" />
        </form>

        <h1 class="titulo-contacto">¡Charlemos para trabajar juntos!</h1>>
      </section>
    </main>
