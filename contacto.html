    <form method="post" action="" target="_blank" enctype="multipart/form-data">
      
      <div class="datos">
        <div class="apellido">
          <label for="nombre"><p>nombre y apellido*</p></label>
          <input type="text" name="nombre" id="nombre" maxlength="30" required>
        </div>
        <div class="email">
          <label for="email"><p>mail*</p></label>
          <input type="mail" name="mail" id="email" required>
        </div>
      </div>

      <div class="idea">
        <label for="idea"><p>Escribe cual es tu idea aqui...</p></label>
        <textarea name="idea" id="idea" maxlength="600" required></textarea>
      </div>

      <div class="gustaria">
        <p>¿Que proyecto te gustaría?</p>
        <div class="seleccionar">
          <label class="checkbox"><input type="checkbox"><span> Diseño</span></label>
          <label class="checkbox"><input type="checkbox"><span> Otra cosa</span></label>
        </div>
      </div>

      <input type="submit" class="boton-enviar" value="enviar">
    </form>
